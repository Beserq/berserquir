name: Evals (LLM judge)

# Behavioral regression layer — the smoke suite is deterministic; this replays
# key eval scenarios against compiled agents with a model as judge.
# Runs ONLY when an API key secret is configured — OPENROUTER_API_KEY
# (preferred: free models, e.g. meta-llama/llama-3.3-70b-instruct:free) or
# ANTHROPIC_API_KEY. The script exits 0 with a skip notice when neither is
# present, so fork PRs and keyless repos never fail.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Behavioral scenarios (skips without API key)
        run: node scripts/evals-judge.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BERSERQIR_JUDGE_MODEL: ${{ vars.BERSERQIR_JUDGE_MODEL }}
          BERSERQIR_NO_UPDATE_CHECK: '1'
