name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the smoke suite only reads the repo.
permissions:
  contents: read

# Superseded runs are cancelled — saves minutes, keeps the queue honest.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false # a Windows failure must not hide a macOS one — cross-platform is a product claim
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 24]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false # smoke never talks to git remotes — don't leave a token in .git/config
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Smoke suite (syntax · guardrails · memory-validate · adapters · installer e2e)
        run: node scripts/smoke.mjs
        env:
          BERSERQIR_NO_UPDATE_CHECK: '1' # no registry calls from CI hooks
