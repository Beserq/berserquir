name: Publish

# Tag-driven releases: `git tag v0.4.1 && git push --tags` publishes to npm.
# Requires the NPM_TOKEN repository secret (npm automation/granular token with
# publish rights on the berserqir package).

on:
  push:
    tags: ['v*']

# One release at a time — never cancel a publish midway.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Tag must match package.json version
        run: |
          node -e "
            const v = require('./installer/package.json').version;
            const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            if (v !== tag) { console.error('tag v' + tag + ' != package.json ' + v); process.exit(1); }
          "
      - name: Smoke suite
        run: node scripts/smoke.mjs
        env:
          BERSERQIR_NO_UPDATE_CHECK: '1'
      - name: Publish to npm
        working-directory: installer
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
