name: Publish

# Tag-driven releases: `git tag v0.4.1 && git push --tags` publishes to npm.
# Requires the NPM_TOKEN repository secret (npm automation/granular token with
# publish rights on the berserqir package).
#
# The `gate` job holds the publish until EVERY other check on the tagged
# commit is green (CI matrix, CodeQL, evals judge when triggered) â€” a release
# never ships from a commit with red or still-running checks. Tagging a
# commit that was never pushed to main will time out here by design: push
# main first, then the tag.

on:
  push:
    tags: ['v*']

# One release at a time â€” never cancel a publish midway.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for all checks on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="$GITHUB_SHA"
          echo "gating release on checks for $sha"
          for i in $(seq 1 80); do
            # all check runs on the commit EXCEPT this workflow's own jobs
            runs=$(gh api "repos/$GITHUB_REPOSITORY/commits/$sha/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name | test("^(gate|publish|release-notes)$") | not)]')
            total=$(echo "$runs" | jq 'length')
            failed=$(echo "$runs" | jq '[.[] | select(.status == "completed" and ((.conclusion // "") | IN("success","neutral","skipped") | not))] | length')
            pending=$(echo "$runs" | jq '[.[] | select(.status != "completed")] | length')
            echo "attempt $i: total=$total pending=$pending failed=$failed"
            if [ "$failed" -gt 0 ]; then
              echo "::error::checks FAILED on $sha â€” publish blocked:"
              echo "$runs" | jq -r '.[] | select(.status == "completed" and ((.conclusion // "") | IN("success","neutral","skipped") | not)) | "  \u2717 \(.name) â†’ \(.conclusion)"'
              exit 1
            fi
            if [ "$total" -gt 0 ] && [ "$pending" -eq 0 ]; then
              echo "all $total checks green â€” release may proceed âš”ď¸Ź"
              exit 0
            fi
            sleep 20
          done
          echo "::error::timed out waiting for checks on $sha (was main pushed before the tag?)"
          exit 1

  publish:
    name: publish
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Tag must match package.json version
        run: |
          node -e "
            const v = require('./installer/package.json').version;
            const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            if (v !== tag) { console.error('tag v' + tag + ' != package.json ' + v); process.exit(1); }
          "
      - name: Smoke suite
        run: node scripts/smoke.mjs
        env:
          BERSERQIR_NO_UPDATE_CHECK: '1'
      - name: Publish to npm
        working-directory: installer
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-notes:
    name: release-notes
    # GitHub Release with auto-generated notes â€” runs only after a successful publish,
    # so the Releases page always mirrors what actually shipped to npm.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create the release (scoped to this job only)
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
